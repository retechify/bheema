<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Bheema's Food Care</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css">

    <style>
        .product-page {
            padding: var(--space-xl) 0;
        }

        .product-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-xl);
            align-items: flex-start;
        }

        .product-image-container {
            position: sticky;
            top: 100px;
            background-color: var(--color-bg-alt);
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-lg);
        }

        .product-image-container img {
            max-width: 100%;
            height: auto;
            object-fit: contain;
        }

        .product-info h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 1rem;
        }

        .product-info .price {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 1.5rem;
        }

        .weight-selector {
            margin-bottom: 2rem;
        }

        .weight-options {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .weight-btn {
            padding: 0.5rem 1.5rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: white;
            cursor: pointer;
            font-weight: 500;
            transition: all var(--transition-fast);
        }

        .weight-btn.active {
            background-color: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .add-actions {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .qty-input {
            display: flex;
            align-items: center;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .qty-input button {
            background: var(--color-bg-alt);
            border: none;
            width: 40px;
            height: 48px;
            cursor: pointer;
            font-size: 1.25rem;
        }

        .qty-input input {
            width: 50px;
            text-align: center;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            background: transparent;
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        .btn-whatsapp:hover {
            background-color: #128C7E;
        }

        .pd-accordion-item {
            border-bottom: 1px solid var(--color-border);
        }

        .pd-accordion-header {
            padding: 1rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
        }

        .pd-accordion-content {
            padding-bottom: 1rem;
            display: none;
            color: var(--color-text-muted);
        }

        .pd-accordion-item.active .pd-accordion-content {
            display: block;
        }

        .pd-accordion-item.active .bx-chevron-down {
            transform: rotate(180deg);
        }

        @media (max-width: 868px) {
            .product-layout {
                grid-template-columns: 1fr;
            }

            .product-image-container {
                position: relative;
                top: 0;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="images/logo/logo.png" alt="Bheema's Food Care" class="logo-img">
                <span>Bheema's <span class="accent-text">Food Care</span></span>
            </a>

            <nav class="nav-menu" id="nav-menu">
                <ul class="nav-list">
                    <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                    <li class="nav-item"><a href="shop.html" class="nav-link">Shop All</a></li>
                    <li class="nav-item"><a href="story.html" class="nav-link">Our Story</a></li>
                    <li class="nav-item"><a href="social.html" class="nav-link">Events</a></li>
                    <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
                </ul>
            </nav>

            <div class="nav-actions">
                <button class="cart-btn" id="cart-btn" aria-label="Open Cart">
                    <i class='bx bx-shopping-bag'></i>
                    <span class="cart-count" id="cart-count">0</span>
                </button>
                <div class="mobile-toggle" id="mobile-toggle">
                    <i class='bx bx-menu'></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-cart" id="close-cart"><i class='bx bx-x'></i></button>
        </div>
        <div class="cart-items" id="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total</span>
                <span id="cart-total-amount">₹0</span>
            </div>
            <button class="btn btn-primary btn-block whatsapp-btn" id="checkout-btn">
                <i class='bx bxl-whatsapp'></i> Order via WhatsApp
            </button>
        </div>
    </div>

    <main class="product-page">
        <div class="container" id="product-container">
            <!-- Product data will be injected here by main.js -->
            <div style="text-align: center; padding: 5rem 0;">
                <p>Loading product details...</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-container">
            <div class="footer-brand">
                <a href="index.html" class="logo footer-logo">
                    <img src="images/logo/logo.png" alt="Bheema's Food Care" class="logo-img" style="height: 40px; width: auto;">
                </a>
                <p class="footer-desc">Rooted in tradition, made for today. Experience the pure power of ancient Indian
                    nutrition.</p>
                <div class="social-links">
                    <a href="https://www.instagram.com/bheemas_food_care/" target="_blank"><i class='bx bxl-instagram'></i></a>
                </div>
            </div>

            <div class="footer-contact">
                <h4>Talk to us</h4>
                <p><i class='bx bx-phone'></i> +91 93424 68878</p>
                <p><i class='bx bx-envelope'></i> bheemas2023@gmail.com</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/products.js?v=3"></script>
    <script src="js/main.js?v=3"></script>
</body>

</html>
